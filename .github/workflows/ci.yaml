name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        folder:
          - "."
          - "examples/simple"
          - "examples/aggregate"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Test ${{ matrix.folder }}
        working-directory: ${{ matrix.folder }}
        run: bazel test //...

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-logs-${{ matrix.os }}-${{ hashFiles(matrix.folder) }}
          path: |
            ${{ matrix.folder }}/bazel-testlogs/**/test.log
            ${{ matrix.folder }}/bazel-testlogs/**/test.xml
          if-no-files-found: warn
          retention-days: 7

  linux-arm64-smoke:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-linux-arm64
          repository-cache: true

      - name: Verify Linux ARM64 CLI alias
        run: |
          bazel cquery 'somepath(//formatjs_cli:cli, @formatjs_cli_toolchains_linux_aarch64//:cli)'

      - name: Smoke test Linux ARM64 CLI
        run: |
          bazel test //tests/arguments:test_fixtures_0_test

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-logs-ubuntu-24.04-arm
          path: |
            bazel-testlogs/**/test.log
            bazel-testlogs/**/test.xml
          if-no-files-found: warn
          retention-days: 7
